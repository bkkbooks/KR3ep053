body:
  text: 正文李先生諱齡壽字辛坨別號匏齊吳江盛澤鎮王江涇人廩貢生著有詩文古文稿分撰續吳江縣志分輯松陵文録著醫話一卷醫方選一卷並藥性摘要一卷醫案效驗若干卷光緒十六年歲次庚寅先生賣藥於莘塔凌部郎家余嘗受業學醫自季夏迄季秋凡三閲月丙申九月望日囊隱道人謹志丙申仲春得囊隱道人手抄李辛坨醫案十冊及此退庵醫案一冊李案因蓋梅研兄所善録出跋語一則如右下而歸之此案則重裝後留案頭備檢囊隱道人者吳江沈陳麟字春孫也別署枕石齊巢今修志退庵先生姓淩氏諱淦字仲清號礪生退庵其晚年別號也先生為吳江之莘塔鎮人中咸豐己未科舉人候選內部正郎與豫嗣祖兵部公友善今其嗣孫昌燧即豫之表弟也先生素通醫理又得李師辛坨及其宗長嘉六先生相與考究精微是以臨證之時神明變化一無浮泛影響習氣此卷醫案雖鮮然自善悟者觀之亦足以因此得彼窺見先生學識大略云光緒丙申夏五囊隱道人跋於枕石齊案徐三十歲春元錢莊風邪自口鼻吸入肺先受之肺主皮毛發為風疹目赤面如渥丹發熱咳嗆多痰頭脹脘悶咽痛小便短澀大便不行脈浮數風已化熱瀰漫上焦急宜清肅肺衛俾疹點透達不致煩躁氣喘為吉鮮竹葉卅張桑葉一錢半連翹心三錢薄荷葉一錢牛蒡子炒研三錢馬勃八分荊芥穗一錢半制殭蠶三錢白杏仁去衣三錢銀花三錢川貝母三錢川通草一錢白蘿蔔汁一小杯沖復診風疹遍體透發胸悶頭脹均愈大便亦行惟寐覺咽乾喉痛咳痰不爽痰中映紅據述素有咯血遺泄病陰虧體質易感風熱脈左弦數右細數舌心色紫以微苦微辛清肺胃之熱以甘寒存肺胃之陰鮮蘆根去節一兩制天蟲三錢連翹心三錢元參心五錢淨蟬衣八分川貝母三錢天花粉三錢牛蒡子炒研一錢半川通草一錢炙知母一錢半桔梗四分生甘草三分鮮藕汁一酒杯沖案孫洞庭山人裕康南貨去夏咯血至今復發時患遺泄胸脘不舒夜不成寐脈雙弦素有痰濕肺胃留熱且有心火治以清泄鮮竹葉卅張連翹心朱拌三錢川貝母三錢白茅根去心八錢水炙紫菀二錢生苡仁四錢元參心四錢全瓜蔞三錢茯神朱拌三錢炙知母二錢川通草一錢建蓮心一錢鮮藕汁一酒杯沖復診投清泄心火之劑咯血遺泄均愈脈亦較和惟胸脘氣分尚覺未舒李辛坨師曰當舒肺氣如旋覆蘇梗之類時作太息之聲素有痰濕以調理脾胃為治懷山藥元米炒黃三錢原支金石斛三錢朱拌茯神三錢炒苡仁四錢米炒川貝母三錢全瓜蔞三錢炒桔白一錢炒棗仁三錢朱拌連翹心三錢鮮藕汁一酒杯沖案徐靄翁洞庭山人長泰和北貨行血虛生風時發風塊瘙癢兩手麻木甚於左兩足艱於舉步素有痰濕所謂風寒濕三氣也治以養血祛風通絡白蒺藜炒去刺三錢川桂枝四分絲瓜絡酒炒三錢左秦艽三錢忍冬藤酒炒三錢酒炒橘絡一錢桑寄生三錢炒苡仁四錢炒荊芥一錢半酒炒桑枝一兩案徐靄翁郎二十歲太平弄紙行咳嗆多痰不爽咯血色紫舌起紅點此肺胃鬱熱不能宣通之故面色㿠白脈細數陰分素虧也先以宣通肺氣佐以泄熱存陰旋覆花絹包一錢半蜜炙紫菀三錢地骨皮三錢白杏仁去皮尖三錢全瓜蔞三錢肥知母炙三錢單桃仁杵三錢桑白皮蜜炙一錢半海蛤殼杵五錢川貝母三錢老枇杷葉拭毛去筋蜜炙兩張李師云可加黑驢膠復診咯血已止咳嗆多痰濃厚青緑色夜間時覺轟熱舌紅點已退脈仍細數以降火滋陰滌痰為治石決明生杵一兩川貝母三錢白滁菊三錢旋覆花絹包一錢半黑山梔三錢鮮竹茹水炒一錢半元參五錢瓜蔞仁杵三錢海蛤殼杵五錢枇杷葉拭毛去筋蜜炙兩張二復咳嗆漸緩轟熱亦平今晨咯出紫黑色一口脈數而浮陰虧火旺之體再交春令又值少陽相火司天之運惟冀水能涵木火不刑金方為妥善仍守前法兼泄木火鮮竹茹水炒一錢半川貝母三錢粉丹皮炒一錢半白茅根去心五錢瓜蔞仁杵三錢海蛤殼杵五錢元參心四錢經霜桑葉一錢半石決明生杵八錢左牡蠣鹽水煅四錢清阿膠蛤粉拌炒成珠一錢半漂淡陳海蜇一兩煎湯代水李師云以上三案亦得手當繼以養肺陰三復咳嗽雖緩而夜分仍作喉間微聞痰聲今晨鼻中吸出紫紅色涕多夢紛紜時汗出脈數如故上焦之熱尚未清肅明日即交春令天暖如暮春深恐咯血復發與以甘寒涼潤鮮竹瀝一兩分兩次沖川貝母三錢炙知母三錢活水蘆根一兩真滁菊三錢石決明杵五錢白茅根一兩元參心三錢左牡蠣杵五錢竹捲心卅片鮮藕汁一酒杯沖李師云用鹹寒於涼潤之中甚妙四復昨交春令夜間咯血三口陰虧之體陽不潛藏脈數仍未稍減擬清養肺胃復以介類潛陽鮮竹茹水炒一錢半川貝母三錢青鱉甲酥炙八錢鮮藕節洗淨三個鐵皮鮮石斛四錢元武版酥炙八錢甜梨肉五錢燕窩屑四錢海蛤殼杵五錢蒸桑葉一錢半粉丹皮八錢漂淡陳海蜇一兩煎湯代水五復據述昨宵咳嗽十減五六惟黎明時有盜汗脈數較前略平治法總以清肺養胃滋腎三者為要領天花粉三錢懷山藥炒黃三錢元參五錢肥玉竹炒三錢干藿斛三錢元武版酥炙一兩川貝母炒三錢燕窩屑四錢炙知母二錢白芍青黛拌二錢浮小麥焙三錢地骨皮露一小杯臨睡服瓊玉膏三錢開水沖六復疊進清熱滋養之劑咳嗽十去六七轟熱亦平惟夜間出痰則嗽時有盜汗多夢紛紜壯火已退陰分大傷前法佐以固攝肥玉竹米炒三錢大白芍米炒三錢煅龍骨五錢元參心五錢懷山藥米炒三錢煅牡蠣五錢川貝母米炒三錢干藿斛三錢炙鱉甲五錢燕窩屑四錢酸棗仁炒三錢炙元武版五錢浮小麥焙五錢桃奴三個李師云以上諸案皆遊刃於虛絶不犯手案秦右五十一歲洞庭山人連年患吐血血崩及三陰虛舌脫液中心豬肝色脈兩手軟弱無力腰痛頭暈手麻耳鳴小溲頻數不禁種種虛象疊現今因新感咳嗆痰中映紅音嘶久病難以驟復先治其標後治其本經霜桑葉一錢半水炙紫菀七分川貝母三錢白池菊一錢半枇杷葉刷毛去筋蜜炙兩張款冬花蜜炙三錢甜杏仁杵三錢生苡仁三錢淨蟬衣八分甜梨肉一兩李辛坨師曰先治新感得先標後本之法方亦清靈可嘉案蘇仰翁寧波人萬順祥北貨行風邪襲於肺絡咳嗆多痰夜間發熱脈數右頤作痛以清肅肺胃白杏仁制天蟲薄荷川貝母前胡苡仁瓜蔞仁竹茹蘇梗白萊蔔汁案陸雲翁素有咯血症時患喉癢癢則嗆嗽吐薄痰脈兩寸皆數左關弦肺虛有熱也治以清肅肺氣甜杏仁去皮尖三錢紫菀水炙七分元參心三錢川貝母三錢竹茹水炒一錢半枇杷葉刷毛淨蜜炙兩張鮮竹葉草張金沸草絹包一錢半百部一錢甜梨肉一兩鮮藕汁一酒杯沖復診投清肺之劑喉癢咳嗆漸愈惟咳嗆時左右脅微痛脈左弦右數前法佐以通絡蜜炙馬兜鈴川貝母三錢橘絡炒一錢蜜炙枇杷葉刷毛淨兩張天花粉三錢竹茹水炒一錢半蜜炙款冬花三錢絲瓜絡炒一錢旋覆花絹包一錢半漂淡陳海蜇一兩煎湯代水李師云通絡方妙案郭右二十餘歲蘇州人廣東郭安庭之妾方書以未産流乳為乳泣今據述病起兩年初起左側腫痛流膿現左右時作脹痛搵之皆有乳汁而天癸仍如期而至似與乳泣一證有間夫乳屬肝胃二經乳汁系胃液所化又述病初發時曾因懊惱而起顯系肝火胃熱鬱蒸所致脈形細數而滑以繆仲醇疏肝清胃法緩調俟肝胃氣和再議滋補青橘葉二錢緑萼梅三錢夏枯花一錢半蒲公英二錢瓜蔞仁杵三錢連翹二錢炒銀花三錢旋覆花絹包一錢半新絳八分川貝母三錢甘菊花二錢炒麥芽三錢復診陰虛體質血易生熱據述經事先期而至乃血熱之明徵乳汁無故自流系肝火胃熱蒸鬱而成亦在血熱妄行之例病原總由陰氣虧損氣不攝血之故前法兼以育陰青橘葉一錢白薇一錢半蛤粉拌阿膠二錢緑萼梅二錢白芍一錢半川貝母三錢蒲公英一錢炒枯生地三錢杭甘菊二錢晨起空心服人乳一酒杯李辛坨師曰有腫痛之候自在肝胃鬱熱著想惟必系氣虛不能固攝故搵之流乳乃液不化血也以益氣涼血清木火治之鄙意以生綿耆麥冬助其肺金以資氣化鮮生地茅根涼其血熱現以清疏肝火之品消其腫硬未知有當否案儲右蘇州人經事愆期此次先期而至腹痛骨節腰脊皆酸色鮮不多陳痛則下胸脘悶得噯則舒口膩脈數舌黃此氣血交滯也四制香附三錢單桃仁去皮尖杵三錢川楝子酒炒一錢半酒炒川芎一錢半吉紅花酒炒一錢臺烏藥二錢酒炒歸鬚一錢半延胡索酒炒一錢半艾葉二錢紅月季花三朵李師云通瘀方甚好案王上海人頭暈如在霧中心悸胸悶不舒胃不思納倦怠嗜臥昏昏若不知人事或不能睡則手足微麻有時鼻孔微扇晨起多痰病已半載此必濕痰積滯清陽不升濁陰不降以辛開通其神明以升散舉其清陽去皮生薑一錢竹瀝三錢半夏三錢石菖蒲一錢薑製朴花一錢薤白酒洗一錢半川鬱金切一錢半炙升麻三分瓜蔞仁杵三錢白杏仁去皮尖三錢軟柴胡三分李師云可稍加養血祛風如當歸秦艽之類案屠右二十餘歲松江人北㘮屠仰山之妾據述經事先期而至至時胃中泛泛欲嘔脘下氣耕作痛頭亦微痛夫經事先期為血熱陰虛則生熱胃中欲嘔脘下作痛皆木乘土之明徵頭痛不甚陰虛非外感也脈細數治宜涼肝清胃酒炒上川連四分水炒竹茹一錢半炒黑山梔二錢青黛拌白芍一錢半川貝母三錢酒炒川楝子一錢半童便制香附二錢炒丹皮一錢半焙白薇一錢半青蒿蒸一錢半川鬱金切一錢白茅根去心五錢李師云嘔可加入吳萸半夏復診陰虧之體氣鬱不舒少腹時脹晨起多痰口苦而干胃不知味種種皆肝木為病肝主疏泄氣味取芳香而不燥者青橘葉一錢半旋覆花絹包一錢半黑山梔二錢緑萼梅一錢半水炒橘紅一錢醋炒柴胡四分青松針一錢粉丹皮炒一錢半川鬱金切一錢川楝子一錢半九香蟲焙一錢臺烏藥二錢案張左六十八歲上海人據述少時曾有咯血症已不復發前年偶有憂慮之事適從高墜下舊疾復發發時喉間介介然遇天陰則血多痰少晴則否此素體有濕絡中有瘀也脈弦數舌膩擬通肺肝之絡宗金匱旋覆花湯合千金葦莖湯法旋覆花絹包一錢半單桃仁三錢冬瓜子杵三錢新絳屑一錢生苡仁三錢蜜炙紫菀一錢川通草八分川貝母三錢絲瓜絡鴨血拌炒一錢半全瓜蔞三錢白茯苓三錢鮮藕汁一酒杯沖李師云可加入川鬱金磨沖茜根亦可加痰多可用蛤粉又云必系痰瘀阻於肺絡方甚當凡有飲之人遇天陰濕先胸中不快以陽氣遏塞故也案衛右據述腹脹如臌已見臍凸納食少許即腹脹難忍腰痛小便不利晨起腫至足跗曾針過兩次脈左細數右沉數舌白此單腹重症本系氣虛作脹加以治不如法脾胃傷殘極矣痼疾未易調治勉以溫補通陽炙綿耆三錢上潞黨米炒三錢天生術米炒三錢益智仁煨三錢懷山藥米炒三錢川桂枝八分白歸身茴香炒三錢淡乾薑五分吳茱萸泡淡三分白茯苓三錢炙甘草五錢臨睡服金匱腎氣丸四錢李師云鼓症忌針放水犯此則傷脾陰復發不治案蘇寧波人嗜酒豪飲酒客多濕濕中伏火結於陽明食入即飢所謂胃中熱則消穀善飢脘間時覺不舒恐成中消之症脈澀舌根黃膩以苦辛通濕中之火薑汁炒川連三分乾葛花三錢生苡仁三錢薑汁炒山梔三錢干佩蘭一錢鮮石斛鐵皮杵四錢薑汁炒竹茹一錢半全瓜蔞三錢雞距子一錢鮮蘆根去節一兩李師云脈澀者難治將來恐成嗝此時火盛後來津液枯矣案馮寧波人感受時令風邪頭痛甚於額咳嗆甚於夜耳癢時出膿水入暮神倦脈左弦右數此風邪挾少陽之火上升也治以清泄蔓荊子炒三錢白蒺藜炒去刺三錢連翹三錢冬桑葉一錢半粉丹皮炒一錢半銀花三錢真滁菊三錢焦山梔三錢制天蟲三錢苦丁茶一錢半杏仁炒焦研末以青蔥搗爛拌和綿裹塞耳中李師云兼少陽治甚是案孫右二十餘歲月前感冒咳嗽發熱現患頭痛上至顛頂痛從左太陽起延及石太陽右頤及耳並腦後右鼻不通李師云可用辛夷荊芥胃中泛泛欲嘔口苦吐酸又云可用左金月事四月不至脈細弦數舌苔黃膩此係少陽木火上升犯胃及肺也擬抑木和中法杭甘菊三錢制天蟲二錢酒炒淡芩一錢半白蒺藜雞子清拌炒去刺三錢石決明鹽水煅六錢炒黑山梔二錢蒸桑葉一錢半水炒竹茹一錢半白杏仁去皮尖三錢水炒橘紅一錢宋半夏一錢半復診頭痛稍緩胃中泛惡較平據述頭痛甚於午前夜分不甚此非陰虛頭痛乃少陽木火上升也懷麟四月正手少陽相火養胎之候春令木火用事又值少陽相火司天之運火曰炎上故犯胃則作惡犯肺則鼻塞且衄也脈仍細弦數舌仍黃膩擬清泄少陽之火羚羊片先煎一錢薑汁炒山梔三錢杭甘菊三錢上川連吳萸二分拌炒去萸四分水炙橘紅一錢姜炒竹茹一錢半酒炒條芩一錢半霜桑葉一錢半石決明鹽水煅六錢苦丁茶一錢白茅根去心一兩再復頭痛已愈胃逆亦平惟皮膚時癢搔之微覺燥而板木此血分素虧而少陽風火余焰未熄也右鼻仍塞惡聞廚房煎熬氣此肺氣不宣想前此感冒咳嗆時清泄未淨也舌膩已退脈弦滑擬以輕劑宣上焦餘熱再議滋養炒黑荊芥一錢半天花粉三錢霜桑葉二錢制天蟲二錢連翹三錢甘菊花二錢牛蒡子炒研三錢黑山梔三錢白茯苓三錢鮮竹葉草張案張韶九山東青口人心腎不交夜不成寐寐則遍體為之不適時患潰泄脈兩手皆弦以心脾腎兼治遠志肉甘草水泡一錢酸棗仁炒三錢煅龍骨二錢麥冬肉辰砂拌不去心三錢茯神辰砂拌三錢鹽水煅牡蠣六錢龍眼肉包上川連末二分三錢連翹辰砂拌三錢雲茯苓三錢夜交藤四錢李師云無他病而不得寐者最難治大約必操持勞思之人責之心營不足人參養營湯歸脾湯等試之案王右寒熱胸悶腹痛齒焦舌白膩而厚不食不便脈右數左伏此濕溫重證故以辛涼開泄鮮蘆根去節一兩五錢枳殼麩炒一錢半白蔻仁帶殼杵兩粒制茅朮八分大腹絨洗一錢半薑製朴絲一錢石菖蒲一錢塊滑石五錢赤茯苓四錢姜半夏三錢白杏仁三錢細木通薑汁炒一錢鮮竹葉卅張生薑一薄片復診左脈伏略起右數齒焦亦退舌白膩轉淡黃中有裂紋而胸悶腹痛稍舒不食不便依然濕溫重證鬱熱未泄仍以前法出入鮮竹葉卅張水炙橘紅一錢半炒枳殼一錢半連翹心朱拌三錢薑製朴絲八分大腹絨酒洗一錢半竹瀝半夏敲三錢白蔻仁帶殼杵兩粒塊滑石四錢薑汁炒竹茹一錢半白杏仁三錢赤茯苓四錢佩蘭梗一錢廣藿梗一錢半服此方大效案黃楚翁烏鎮人自前月感冒後屢咳不已致失血音嘶鼻時流涕咽痛咳甚於夜脈兩手皆數右寸尤甚此肺有留熱久咳傷陰擬以清潤肺經鮮琵琶葉拭毛去筋蜜炙三錢甜杏霜三錢真柿霜三錢天花粉三錢生苡仁三錢旋覆花包一錢半川貝母三錢蜜炙紫菀一錢新絳屑八分白茅根去心八錢藕節洗三個復診投清潤肺經之劑血止夜咳不甚咽痛稍減脈數漸和惟音不響亮流涕如故由服辛溫開泄太過肺陰受傷不能還復以滋養肺金西洋參元米炒三錢生苡仁三錢白池菊三錢肥玉竹炒三錢天花粉三錢干百合四錢元參三錢川貝母三錢生甘草三分再復血止嗆緩咽痛亦愈聲音較亮惟鼻流清涕涓涓不絶總由開泄太過肺氣虛耗不能收攝耳以前法進之蜜炙耆皮二錢大白芍二錢阿膠煬化二錢北沙參三錢川貝母三錢麥冬肉三錢蜜炙馬兜鈴三錢肥玉竹炒三錢白池菊三錢野百合五錢李師云此補肺方亦妙可加五味子案金鴻翁本城人朝食暮吐完穀不腐二便俱祕脈軟右關尤甚舌淡此關格之漸也東洋參三錢淡乾薑四分法半夏二錢上肉桂飯丸藥汁下三分旋覆花包一錢半水炙陳皮一錢製附子三分代赭石醋煅研四錢白茯苓三錢藕汁梨汁甘蔗汁各一酒杯薑汁少許滴衝入復診投溫補辛通之劑胃反已止大小便亦通脈遲而軟右關略起畏寒胸脘時痛仍以前法出入東洋參三錢公丁香七隻姜半夏二錢上肉桂飯丸藥汁下四分北細辛二分炙陳皮一錢半淡乾薑五分旋覆花包一錢半雲茯苓三錢淡吳萸二分代赭石醋煅研四錢川楝子酒炒一錢半上沉香藕汁磨沖四分李師云腎為胃關可用鹿茸人參案王先生本地人痰濕鬱滯現交夏令正濕熱鬱蒸之時口苦納減神倦頭暈耳聾鼻塞大便艱脈澀舌黃治以辛開茅朮瓜蔞仁薑汁炒山梔石菖蒲塊滑石蒼耳子薑汁炒川連石決明炒苡仁薑製川朴白杏仁加蘆根生薑案徐右菊堂夫人公義碼頭芝麻作川沙人素體陰虧兼以情懷抑鬱五志之火燔灼於內證見寐中盜汗汗出指麻肌冷掌心灼熱日晡發熱肌膚亦灼頭暈口苦胃減便艱舌根黃膩脈兩手細數種種皆陰液虧損之徵擬以育陰清熱養營固衛為治宗仲聖黃連阿膠湯法加味清阿膠蛤粉拌炒三錢酸棗仁炒三錢煅龍骨四錢上川連酒炒三分云茯神辰砂拌三錢左牡蠣鹽水煅五錢西洋參米炒三錢淮小麥焙三錢炙元武版四錢炙鱉甲四錢甘菊花三錢大白芍炒二錢生穀芽五錢李師云龍牡稍鈍案席洞庭山人熱鬱濕中不能外達口渴不引飲泛泛欲嘔頭痛發熱氣急脈數而濡舌白而潤急宜宣泄上焦氣分鮮蘆根去節一兩廣藿梗一錢半炒枳殼一錢半鮮竹葉卅張制川朴一錢白杏仁三錢鮮佛手一錢半法半夏二錢益元散鮮荷葉包刺孔三錢鮮荷梗去刺一尺復診體虛感邪濕熱蘊結於心肺之分壯熱氣急渴不引飲胃中泛惡懊憹大便不行小便短赤舌轉微黃而不潤脈來數甚急以辛涼開泄中上二焦蘆根去節一兩制川朴八分姜炒竹茹一錢半酒炒淡芩一錢半薑製半夏一錢半塊滑石四錢鮮竹葉卅張白杏仁三錢藿梗一錢半薑製川連三分石菖蒲五分川鬱金杵一錢荷梗去刺一尺李師云方皆入扣案李干臣寧波人拋球場匯安洋莊暑熱客邪迫血妄行傾盆盈碗色紫而厚咳嗆血即隨之上溢如火燎原不可向邇胸悶脅痛肌膚灼熱目閉氣急脈弦數大勢來凶暴急以竹葉石膏桃仁承氣合犀角地黃復方以救之香犀尖磨沖五分單桃仁杵三錢連翹三錢鮮生地打一兩五錢鮮竹葉卅張黑山梔三錢生大黃二錢丹皮二錢百草霜二錢生石膏敲碎包一兩童子小便一杯沖李師云妙李師云此武班中之陳州會也竟獲大勝復診昨投大劑清熱通瘀嘔血已止胸悶亦開惟咳嗆時作唇口乾燥余焰尚未熄也脈弦數較昨稍斂舌黃膩邊紫絳仍以甘寒清熱佐以消瘀之品鮮蘆根去節一兩側柏葉三錢連翹三錢白茅根去心一兩鮮生地一兩黑梔三錢鮮竹葉卅張茜草根三錢丹皮一錢半鮮荷葉一角枇杷葉刷毛淨三錢西瓜翠衣三錢紅通草一錢醋製大黃研細末分作兩包兩次沖服六分李師轉方尤靈妙案沈抑鬱停食致病胸滿左側有塊今塊雖隱伏而胸次板實滿悶胃納頓減病經三月脈弦而澀此木鬱土中失調達之性致肝脾胃交困木鬱達之遵經旨也水炒柴胡五分廣木香八分石菖蒲八分北細辛三分炒枳實一錢川鬱金杵一錢半生香附三錢制川朴一錢鮮薤白酒洗二錢全瓜蔞三錢法半夏二錢川楝子酒炒一錢半白茯苓三錢復診尤在涇先生云胸為陽之位陽氣不布則窒而不通宜溫通不宜清開愈開則愈窒矣前法不應轉以解鬱通陽為治桂枝八分茯苓三錢酒炒撫芎二錢乾薑一錢生益智仁三錢泡淡吳萸三分炙草五分水炒柴胡六分川椒炒去汗三分生薑兩片陸子和先生丸方臍旁氣時墜下多走尤劇有時濕水流下至足足指足心亦時出冷水此足太陰為寒濕所困病經數年藥已遍嘗想煎劑不應姑以丸藥試之生白朮二兩淡乾薑一兩炙甘草六錢生茅朮一兩五錢淡附子一兩上藥生曬勿炒稀粥糊丸臨睡每服三錢用西洋參三錢煎湯送下李師云參補中益氣法加細辛案葉右池亭上人情懷抑鬱經水不至胸悶氣急大病之後元氣不復脈細數擬解鬱參以育陰酥炙鱉甲八錢鱉血炒柴胡四分酒炒歸身一錢半蒸青蒿一錢半青橘葉一錢酒炒大白芍二錢童便制香附二錢緑萼梅二錢黑驢膠蛤粉拌炒一錢半地骨皮一錢半炒黃山藥三錢炒丹皮一錢半案顧鄧村人酒客濕蘊中焦寒熱得汗不解渴而引飲胸悶小便短赤脈濡數舌垢膩堆積濕溫重證也生石膏碎三錢塊滑石四錢廣藿梗一錢半生茅朮三分薑製川朴一錢炒枳殼一錢半細木通薑汁焙一錢活水蘆根二兩白杏仁炒去皮尖三錢赤茯苓四錢復診寒熱已退目黃爪甲微黃足跗起泡纍纍脈濡數舌黃膩濕熱充斥三焦發越未透宗仲聖法綿茵陳先煎三錢酒炒川連五分飛滑石五錢煨草果八分黑山梔三錢酒炒淡芩一錢半赤茯苓四錢炙知母一錢半製大黃一錢鹽水炒川柏一錢車前子案鄭右廣東人洽記土行晨起登高受風虛邪中之即覺懊憹午後陡然眩暈欲厥現兩顴色赤愁眉不展時欲哭泣脈沉按弦數素有肝疾常患頭痛外風引動肝陽上升無制惟懷麟六月芳香開泄之品皆在禁例治擬直折厥陰毋使風火相煽致動胎元當歸龍薈丸同煎二錢石決明鹽水煅六錢杭甘菊去蒂一錢半羚角尖鎊先煎一錢勾藤後下四錢穭豆衣三錢白蒺藜雞子清拌炒去刺三錢川楝子煨一錢半川鬱金切一錢半遠志肉甘草炙四分抱木茯神辰砂拌三錢漂淡海蜇一兩案王十六歲癇證病經半載月必一發發則卒僕角弓反張手足揚擲口吐涎沫此必有痰凝聚於肝膽胞絡久則化熱熱則生風脈細緊弦數治以熄風除痰清熱羚羊角一錢半法半夏一錢半石決明鹽水煅五錢明天麻煨二錢抱木茯神辰砂拌三錢遠志肉甘草四分鉤藤後下四錢石菖蒲四分白茯苓二錢薑汁炒竹茹一錢半蒼龍齒煅三錢水炙陳皮一錢陳膽星四分制天蟲二錢案沈南長興久嗽痰出不爽咽中如有炙臠喉管狹窄而時癢頭暈如在舟車中閲前所服方辛散燥烈已十餘劑矣肺為嬌臟豈堪受此摧殘陰液已涸肝陽隨之而上脈細弦數舌絳無苔故以滋潤肺陰為補救之法如花木枯萎頻頻灌溉之莧麥冬辰砂拌三錢川貝母三錢甜杏仁去皮尖三錢肥玉竹三錢淡元參青黛拌三錢甜桔梗三分西洋參三錢天花粉切三錢生甘草四分旋覆花包一錢半真柿霜三錢淡芩一錢半川楝子一錢半
